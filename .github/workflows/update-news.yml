name: Update NTN Bulletin JSON

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-news-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug show generate_news.py
        run: |
          echo "===== generate_news.py (líneas 160-190) ====="
          sed -n '160,190p' scripts/generate_news.py

      - name: Generate news.json
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: python scripts/generate_news.py

      - name: Commit updated news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh MNO bulletin JSON"
          git push
